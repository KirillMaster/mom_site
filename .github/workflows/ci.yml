name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  backend-test:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: |
          dotnet restore MomSite.API/MomSite.API.csproj
          dotnet restore MomSite.Tests/MomSite.Tests.csproj
        working-directory: backend

      - name: Build
        run: dotnet build MomSite.API/MomSite.API.csproj --no-restore --configuration Release
        working-directory: backend

      - name: Test
        run: dotnet test MomSite.Tests/MomSite.Tests.csproj --no-restore --configuration Release --verbosity normal
        working-directory: backend

  frontend-test:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: TypeScript check
        run: npx tsc --noEmit
        working-directory: frontend

      - name: Test
        run: npx jest --ci --passWithNoTests --testPathIgnorePatterns='e2e/'
        working-directory: frontend
