services:
  postgres:
    image: postgres:latest
    container_name: mom_site_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mom_site_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-mom_site_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mom_site_network

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mom_site_api
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      - JWT__Secret=${JWT_SECRET}
      - JWT__Issuer=${JWT_ISSUER:-mom-site}
      - JWT__Audience=${JWT_AUDIENCE:-mom-site}
      - AdminPassword=${ADMIN_PASSWORD}
      # Email SMTP Configuration
      - EMAIL_SMTP_SERVER=${EMAIL_SMTP_SERVER:-smtp.gmail.com}
      - EMAIL_SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - EMAIL_USERNAME=${EMAIL_USERNAME}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@angelamoiseenko.ru}
      - EMAIL_TO=${EMAIL_TO:-karangela@narod.ru}
      # S3 Storage Configuration
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}
      - S3_SERVICE_URL=${S3_SERVICE_URL:-https://s3.twcstorage.ru}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_BASE_URL=${S3_BASE_URL}
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: ["dotnet", "ef", "database", "update"]
    networks:
      - mom_site_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: mom_site_frontend
    environment:
      - NEXT_PUBLIC_API_URL=http://mom_site_api:5000
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - mom_site_network

volumes:
  postgres_data:

networks:
  mom_site_network: